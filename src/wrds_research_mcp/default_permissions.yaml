# Default permission profiles for MCP-accessible research data.
#
# Keep this file conservative. The model may interpret intent, but this policy
# decides what the server is allowed to query and where it may write outputs.

profiles:
  demo:
    description: Local deterministic demo data. No WRDS credentials required.
    source: mock
    allowed_datasets:
      - crsp_daily_returns
      - crsp_monthly_returns
    max_date_span_days: 366
    max_rows: 100000
    max_generic_rows: 1000
    output_root: ~/.wrds-research-mcp/data/demo
    allow_raw_sql: false
    allowed_libraries: []
    blocked_libraries: []

  wrds_readonly:
    description: Read-only WRDS profile for approved CRSP stock return queries and guarded generic extracts.
    source: wrds
    allowed_datasets:
      - crsp_daily_returns
      - crsp_monthly_returns
    max_date_span_days: 366
    max_rows: 100000
    max_generic_rows: 5000
    output_root: ~/.wrds-research-mcp/data/wrds
    allow_raw_sql: false
    allowed_libraries:
      - "*"
    blocked_libraries:
      - information_schema
      - pg_catalog

datasets:
  crsp_daily_returns:
    description: CRSP daily stock returns with security-name resolution.
    tables:
      - crsp.stkdlysecuritydata
      - crsp.stocknames_v2
    allowed_fields:
      - date
      - permno
      - ticker
      - company_name
      - ret
      - retx
      - prc
      - vol
      - source
    required_filters:
      - date_range
      - security_identifier
    allowed_frequencies:
      - daily
    allowed_output_formats:
      - parquet
    allowed_query_templates:
      - crsp_daily_returns_v2

  crsp_monthly_returns:
    description: CRSP monthly stock returns from current monthly security data.
    tables:
      - crsp.stkmthsecuritydata
    allowed_fields:
      - date
      - permno
      - ticker
      - company_name
      - ret
      - retx
      - prc
      - vol
      - source
    required_filters:
      - date_range
      - security_identifier
    allowed_frequencies:
      - monthly
    allowed_output_formats:
      - parquet
    allowed_query_templates:
      - crsp_monthly_returns_v1
