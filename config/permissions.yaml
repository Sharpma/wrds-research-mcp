# Permission profiles for MCP-accessible research data.
#
# Keep this file conservative. The model may interpret intent, but this policy
# decides what the server is allowed to query and where it may write outputs.

profiles:
  demo:
    description: Local deterministic demo data. No WRDS credentials required.
    source: mock
    allowed_datasets:
      - crsp_daily_returns
    max_date_span_days: 366
    max_rows: 100000
    output_root: data/demo
    allow_raw_sql: false

  wrds_readonly:
    description: Read-only WRDS profile for approved CRSP daily return queries.
    source: wrds
    allowed_datasets:
      - crsp_daily_returns
    max_date_span_days: 366
    max_rows: 100000
    output_root: data/wrds
    allow_raw_sql: false

datasets:
  crsp_daily_returns:
    description: CRSP daily stock returns with security-name resolution.
    tables:
      - crsp.stkdlysecuritydata
      - crsp.stocknames_v2
    allowed_fields:
      - date
      - permno
      - ticker
      - company_name
      - ret
      - retx
      - prc
      - vol
      - source
    required_filters:
      - date_range
      - security_identifier
    allowed_frequencies:
      - daily
    allowed_output_formats:
      - parquet
    allowed_query_templates:
      - crsp_daily_returns_v2
