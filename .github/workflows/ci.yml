name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - demo
      - package

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --extra dev --extra mcp

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build
